<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action Items - MedSync NP Router</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['IBM Plex Sans', 'sans-serif'] },
          colors: { brand: { purple: '#7030a0', blue: '#3656b8', cyan: '#01a7cb' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <div id="toast-container"></div>

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-2">
          <img src="./medsync-logo.png" alt="MedSync" class="h-8 w-auto">
          <span class="text-xl font-bold text-gray-900">NP Router</span>
        </div>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-gray-600 hover:text-gray-900">Finder</a>
          <a href="providers.html" class="text-gray-600 hover:text-gray-900">Providers</a>
          <a href="credentials.html" class="text-gray-600 hover:text-gray-900">Credentials</a>
          <a href="dashboard.html" class="text-gray-600 hover:text-gray-900">Dashboard</a>
          <a href="action-items.html" class="text-brand-blue font-medium border-b-2 border-brand-blue pb-1">Action Items</a>
          <a href="pipeline.html" class="text-gray-600 hover:text-gray-900">Pipeline</a>
          <a href="settings.html" class="text-gray-600 hover:text-gray-900">Settings</a>
        </div>
        <div class="flex items-center gap-4">
          <span id="userEmail" class="text-sm text-gray-600"></span>
          <button id="logoutBtn" class="text-sm text-gray-600 hover:text-gray-900 flex items-center gap-1">
            <i data-feather="log-out" class="h-4 w-4"></i> Sign Out
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Stats -->
    <div class="grid grid-cols-3 md:grid-cols-6 gap-4 mb-6">
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">Critical</div>
        <div class="text-2xl font-bold text-red-600" id="statCritical">0</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">High</div>
        <div class="text-2xl font-bold text-orange-500" id="statHigh">0</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">Medium</div>
        <div class="text-2xl font-bold text-yellow-600" id="statMedium">0</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">Low</div>
        <div class="text-2xl font-bold text-gray-500" id="statLow">0</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">Overdue</div>
        <div class="text-2xl font-bold text-red-600" id="statOverdue">0</div>
      </div>
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">Total Open</div>
        <div class="text-2xl font-bold text-gray-900" id="statOpen">0</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
      <div class="flex flex-wrap items-center gap-3">
        <span class="text-sm text-gray-600 font-medium">Priority:</span>
        <div class="flex flex-wrap gap-1">
          <button data-priority="" class="pri-filter-btn px-3 py-1 rounded-full text-sm font-medium bg-brand-blue text-white">All</button>
          <button data-priority="Critical" class="pri-filter-btn px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Critical</button>
          <button data-priority="High" class="pri-filter-btn px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">High</button>
          <button data-priority="Medium" class="pri-filter-btn px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Medium</button>
          <button data-priority="Low" class="pri-filter-btn px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Low</button>
        </div>

        <span class="text-sm text-gray-600 font-medium ml-2">Type:</span>
        <select id="filterType" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm">
          <option value="">All</option>
          <option value="auto">Auto-Generated</option>
          <option value="manual">Manual</option>
        </select>

        <select id="filterCategory" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm">
          <option value="">All Categories</option>
          <option value="Licenses">Licenses</option>
          <option value="Credentials">Credentials</option>
          <option value="Group Enrollments">Group Enrollments</option>
          <option value="Onboarding">Onboarding</option>
          <option value="Re-Credentialing">Re-Credentialing</option>
          <option value="Pipeline">Pipeline</option>
          <option value="Manual">Manual</option>
        </select>

        <label class="flex items-center gap-2 px-3 py-1.5 border border-gray-300 rounded-lg text-sm cursor-pointer hover:bg-gray-50">
          <input type="checkbox" id="filterOverdue" class="w-4 h-4 text-brand-blue rounded focus:ring-brand-blue">
          <span>Overdue only</span>
        </label>

        <div class="flex-1"></div>

        <button id="addManualBtn" class="px-4 py-1.5 bg-brand-blue text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition flex items-center gap-1">
          <i data-feather="plus" class="h-4 w-4"></i> Add Action Item
        </button>
      </div>
    </div>

    <!-- Action Items List -->
    <div id="actionItemsList" class="space-y-3">
      <div class="text-center py-12 text-gray-500">
        <div class="loading-spinner mx-auto mb-2"></div>
        Loading action items...
      </div>
    </div>
  </main>

  <!-- Add Manual Action Item Modal -->
  <div id="addModal" class="modal-backdrop hidden">
    <div class="modal-content w-full max-w-lg p-6 m-4">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-semibold text-gray-900">Add Action Item</h3>
        <button id="closeAddModal" class="text-gray-400 hover:text-gray-600">
          <i data-feather="x" class="h-6 w-6"></i>
        </button>
      </div>
      <form id="addForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
          <input type="text" id="ai-title" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="ai-desc" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
            <select id="ai-priority" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none">
              <option value="Medium">Medium</option>
              <option value="Critical">Critical</option>
              <option value="High">High</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Due Date</label>
            <input type="date" id="ai-due" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Assigned To</label>
          <input type="text" id="ai-assigned" placeholder="email@example.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-blue focus:border-transparent outline-none">
        </div>
        <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
          <button type="button" id="cancelAdd" class="px-4 py-2 text-gray-600 hover:text-gray-900">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-brand-blue text-white rounded-lg font-medium hover:bg-blue-700 transition">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { requireAuth, wireLogoutButton } from './auth.js';
    import { apiRequest } from './apiClient.js';
    import { getDataClient } from './dataClient.js';

    const PRIORITY_ORDER = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    const PRIORITY_STYLES = {
      Critical: { border: 'border-l-red-600', bg: 'bg-red-50', badge: 'bg-red-100 text-red-800' },
      High:     { border: 'border-l-orange-500', bg: 'bg-orange-50', badge: 'bg-orange-100 text-orange-800' },
      Medium:   { border: 'border-l-yellow-400', bg: 'bg-yellow-50', badge: 'bg-yellow-100 text-yellow-800' },
      Low:      { border: 'border-l-gray-300', bg: 'bg-gray-50', badge: 'bg-gray-100 text-gray-600' }
    };
    const CATEGORY_ICONS = {
      Licenses: 'file-text', Credentials: 'shield', 'Group Enrollments': 'layers',
      Onboarding: 'clipboard', 'Re-Credentialing': 'refresh-cw', Pipeline: 'user-plus', Manual: 'edit-3'
    };

    let currentUser = null;
    let db = null;
    let allItems = [];
    let filteredItems = [];
    let activePriority = '';
    let dismissed = {};

    // ─── Utilities ───────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.innerHTML = `<i data-feather="${type==='success'?'check-circle':'alert-circle'}" class="h-4 w-4"></i><span>${msg}</span>`;
      c.appendChild(t);
      feather.replace({ width: 16, height: 16 });
      setTimeout(() => { t.style.animation = 'slideOut 0.3s ease-out forwards'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    function todayStr() { return new Date().toLocaleDateString('sv'); }
    function daysFromNow(n) { return new Date(Date.now() + n * 86400000).toLocaleDateString('sv'); }
    function daysBetween(a, b) { return Math.ceil((new Date(a) - new Date(b)) / 86400000); }

    function formatDate(d) {
      if (!d) return '—';
      const s = String(d);
      if (s.length === 10 && s[4] === '-') {
        const [y, m, day] = s.split('-');
        return new Date(y, m - 1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }
      return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

    function loadDismissed() {
      try {
        const raw = localStorage.getItem('dismissed_actions');
        if (!raw) return {};
        const d = JSON.parse(raw);
        const now = Date.now();
        const clean = {};
        for (const [k, v] of Object.entries(d)) {
          if (now - v < 24 * 60 * 60 * 1000) clean[k] = v;
        }
        localStorage.setItem('dismissed_actions', JSON.stringify(clean));
        return clean;
      } catch { return {}; }
    }

    function dismissItem(id) {
      dismissed[id] = Date.now();
      localStorage.setItem('dismissed_actions', JSON.stringify(dismissed));
      applyFilters();
    }

    // ─── Data Loading & Rule Engine ──────────────────────────────────
    async function loadAllData() {
      dismissed = loadDismissed();
      try {
        const result = await apiRequest('/action-items');
        allItems = result.items || [];
      } catch (error) {
        const container = document.getElementById('actionItemsList');
        container.innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-800">
            <p class="font-medium">Error loading action items</p>
            <p class="text-sm mt-1">Please refresh the page and try again.</p>
          </div>
        `;
        console.error(error);
        allItems = [];
      }

      applyFilters();
    }

    // ─── Filtering & Sorting ─────────────────────────────────────────
    function applyFilters() {
      const typeFilter = document.getElementById('filterType').value;
      const catFilter = document.getElementById('filterCategory').value;
      const overdueOnly = document.getElementById('filterOverdue').checked;
      const today = todayStr();

      // Re-filter dismissed
      const visibleAll = allItems.filter(i => i.type !== 'auto' || !dismissed[i.id]);

      filteredItems = visibleAll.filter(i => {
        if (activePriority && i.priority !== activePriority) return false;
        if (typeFilter && i.type !== typeFilter) return false;
        if (catFilter && i.category !== catFilter) return false;
        if (overdueOnly) {
          if (!i.dueDate || i.dueDate >= today) return false;
        }
        return true;
      });

      // Sort: overdue first, then by priority, then by due date
      filteredItems.sort((a, b) => {
        const aOverdue = a.dueDate && a.dueDate < today ? 1 : 0;
        const bOverdue = b.dueDate && b.dueDate < today ? 1 : 0;
        if (bOverdue !== aOverdue) return bOverdue - aOverdue;
        const aPri = PRIORITY_ORDER[a.priority] ?? 9;
        const bPri = PRIORITY_ORDER[b.priority] ?? 9;
        if (aPri !== bPri) return aPri - bPri;
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return 0;
      });

      updateStats();
      renderList();
    }

    function updateStats() {
      const today = todayStr();
      const visible = allItems.filter(i => i.type !== 'auto' || !dismissed[i.id]);
      const counts = { Critical: 0, High: 0, Medium: 0, Low: 0 };
      let overdue = 0;
      visible.forEach(i => {
        if (counts[i.priority] !== undefined) counts[i.priority]++;
        if (i.dueDate && i.dueDate < today) overdue++;
      });
      document.getElementById('statCritical').textContent = counts.Critical;
      document.getElementById('statHigh').textContent = counts.High;
      document.getElementById('statMedium').textContent = counts.Medium;
      document.getElementById('statLow').textContent = counts.Low;
      document.getElementById('statOverdue').textContent = overdue;
      document.getElementById('statOpen').textContent = visible.length;
    }

    // ─── Rendering ───────────────────────────────────────────────────
    function renderList() {
      const container = document.getElementById('actionItemsList');
      const today = todayStr();

      if (filteredItems.length === 0) {
        container.innerHTML = '<div class="text-center py-12 text-gray-500">No action items match your filters</div>';
        return;
      }

      container.innerHTML = filteredItems.map(item => {
        const style = PRIORITY_STYLES[item.priority] || PRIORITY_STYLES.Medium;
        const icon = CATEGORY_ICONS[item.category] || 'circle';
        const isOverdue = item.dueDate && item.dueDate < today;
        const isManual = item.type === 'manual';

        let dueDateHtml = '';
        if (item.dueDate) {
          const cls = isOverdue ? 'text-red-600 font-medium' : 'text-gray-500';
          dueDateHtml = `<span class="${cls}">${isOverdue ? 'Overdue: ' : 'Due: '}${formatDate(item.dueDate)}</span>`;
        }

        let actionsHtml = '';
        if (isManual) {
          actionsHtml = `
            <select onchange="window._updateManualStatus('${item.id}', this.value)" class="px-2 py-1 border border-gray-300 rounded text-xs">
              <option value="Open" ${item.status === 'Open' ? 'selected' : ''}>Open</option>
              <option value="In Progress" ${item.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
              <option value="Done">Done</option>
              <option value="Dismissed">Dismiss</option>
            </select>
            <button onclick="window._deleteManual('${item.id}')" class="p-1 text-gray-400 hover:text-red-600" title="Delete">
              <i data-feather="trash-2" class="h-4 w-4"></i>
            </button>
          `;
        } else {
          actionsHtml = `
            <button onclick="window._dismissAuto('${item.id}')" class="px-2 py-1 border border-gray-300 rounded text-xs text-gray-500 hover:bg-gray-100">Dismiss</button>
          `;
        }

        let linkHtml = '';
        if (item.link) {
          linkHtml = `<a href="${item.link}" class="px-3 py-1 bg-brand-blue text-white rounded text-xs font-medium hover:bg-blue-700">View</a>`;
        }

        return `
          <div class="bg-white rounded-lg shadow border-l-4 ${style.border} p-4">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1 flex-wrap">
                  <span class="badge ${style.badge} text-[11px]">${item.priority}</span>
                  <span class="badge bg-gray-100 text-gray-600 text-[11px] flex items-center gap-1">
                    <i data-feather="${icon}" class="h-3 w-3"></i> ${item.category}
                  </span>
                  ${dueDateHtml ? `<span class="text-xs">${dueDateHtml}</span>` : ''}
                  ${item.assignedTo ? `<span class="text-xs text-gray-400">${escapeHtml(item.assignedTo)}</span>` : ''}
                </div>
                <h4 class="text-sm font-semibold text-gray-900">${escapeHtml(item.title)}</h4>
                ${item.description ? `<p class="text-sm text-gray-500 mt-1">${escapeHtml(item.description)}</p>` : ''}
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                ${actionsHtml}
                ${linkHtml}
              </div>
            </div>
          </div>
        `;
      }).join('');

      feather.replace({ width: 12, height: 12 });
    }

    // ─── Manual Item CRUD ────────────────────────────────────────────
    window._updateManualStatus = async (id, status) => {
      const update = { status };
      if (status === 'Done' || status === 'Dismissed') {
        update.completed_at = new Date().toISOString();
        update.completed_by = currentUser.email;
      }
      const { error } = await db.from('action_items').update(update).eq('id', id);
      if (error) { showToast('Error updating', 'error'); return; }
      showToast(status === 'Done' ? 'Marked as done' : 'Status updated');
      await loadAllData();
    };

    window._deleteManual = async (id) => {
      if (!confirm('Delete this action item?')) return;
      const { error } = await db.from('action_items').delete().eq('id', id);
      if (error) { showToast('Error deleting', 'error'); return; }
      showToast('Deleted');
      await loadAllData();
    };

    window._dismissAuto = (id) => {
      dismissItem(id);
      showToast('Dismissed for 24 hours');
    };

    async function saveManualItem(e) {
      e.preventDefault();
      const title = document.getElementById('ai-title').value.trim();
      if (!title) { showToast('Title is required', 'error'); return; }

      const { error } = await db.from('action_items').insert({
        type: 'manual', title,
        description: document.getElementById('ai-desc').value.trim() || null,
        priority: document.getElementById('ai-priority').value,
        due_date: document.getElementById('ai-due').value || null,
        assigned_to: document.getElementById('ai-assigned').value.trim() || null,
        status: 'Open',
        created_by: currentUser.email
      });
      if (error) { showToast('Error saving', 'error'); console.error(error); return; }
      showToast('Action item added');
      document.getElementById('addModal').classList.add('hidden');
      await loadAllData();
    }

    // ─── Init ────────────────────────────────────────────────────────
    async function init() {
      try {
        currentUser = await requireAuth();
        db = await getDataClient();
        document.getElementById('userEmail').textContent = currentUser.email;
        wireLogoutButton();

        // Priority filters
        document.querySelectorAll('.pri-filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            activePriority = btn.dataset.priority;
            document.querySelectorAll('.pri-filter-btn').forEach(b => {
              b.classList.remove('bg-brand-blue', 'text-white');
              b.classList.add('bg-gray-100', 'text-gray-600');
            });
            btn.classList.remove('bg-gray-100', 'text-gray-600');
            btn.classList.add('bg-brand-blue', 'text-white');
            applyFilters();
          });
        });

        document.getElementById('filterType').addEventListener('change', applyFilters);
        document.getElementById('filterCategory').addEventListener('change', applyFilters);
        document.getElementById('filterOverdue').addEventListener('change', applyFilters);

        // Add modal
        document.getElementById('addManualBtn').addEventListener('click', () => {
          document.getElementById('ai-title').value = '';
          document.getElementById('ai-desc').value = '';
          document.getElementById('ai-priority').value = 'Medium';
          document.getElementById('ai-due').value = '';
          document.getElementById('ai-assigned').value = '';
          document.getElementById('addModal').classList.remove('hidden');
        });
        document.getElementById('closeAddModal').addEventListener('click', () => document.getElementById('addModal').classList.add('hidden'));
        document.getElementById('cancelAdd').addEventListener('click', () => document.getElementById('addModal').classList.add('hidden'));
        document.getElementById('addModal').addEventListener('click', (e) => { if (e.target.id === 'addModal') document.getElementById('addModal').classList.add('hidden'); });
        document.getElementById('addForm').addEventListener('submit', saveManualItem);

        await loadAllData();
        feather.replace();
      } catch (e) { console.error('Init error:', e); }
    }

    init();
  </script>
</body>
</html>
