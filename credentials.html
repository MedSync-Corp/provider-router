<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credentials - MedSync NP Router</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['IBM Plex Sans', 'sans-serif'],
          },
          colors: {
            brand: {
              purple: '#7030a0',
              blue: '#3656b8',
              cyan: '#01a7cb',
            }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-2">
          <img src="./medsync-logo.png" alt="MedSync" class="h-8 w-auto">
          <span class="text-xl font-bold text-gray-900">NP Router</span>
        </div>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-gray-600 hover:text-gray-900">Finder</a>
          <a href="roster.html" class="text-gray-600 hover:text-gray-900">Roster</a>
          <a href="dashboard.html" class="text-gray-600 hover:text-gray-900">Dashboard</a>
        </div>
        <div class="flex items-center gap-4">
          <span id="userEmail" class="text-sm text-gray-600"></span>
          <button id="logoutBtn" class="text-sm text-gray-600 hover:text-gray-900 flex items-center gap-1">
            <i data-feather="log-out" class="h-4 w-4"></i>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <section class="bg-white rounded-lg shadow p-8">
      <div class="inline-flex items-center gap-2 rounded-full bg-amber-100 text-amber-800 px-3 py-1 text-sm font-medium mb-5">
        <i data-feather="alert-triangle" class="h-4 w-4"></i>
        API Migration
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Credentials moved to Roster</h1>
      <p class="text-gray-600 mt-3">
        The API-backed deployment consolidates credential management into Roster. Use that page for credential
        edits, note capture, and provider-specific updates.
      </p>
      <div class="mt-6 flex flex-wrap gap-3">
        <a href="roster.html" class="inline-flex items-center gap-2 px-4 py-2 bg-brand-blue text-white rounded-lg font-medium hover:bg-blue-700 transition">
          <i data-feather="shield" class="h-4 w-4"></i>
          Open Roster
        </a>
        <a href="dashboard.html" class="inline-flex items-center gap-2 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition">
          <i data-feather="bar-chart-2" class="h-4 w-4"></i>
          Open Dashboard
        </a>
      </div>
    </section>
  </main>

  <script type="module">
    import { requireAuth, wireLogoutButton } from './auth.js';

    async function init() {
      const user = await requireAuth();
      document.getElementById('userEmail').textContent = user.email || '';
      wireLogoutButton();
      feather.replace();
    }

    init().catch((error) => {
      console.error('Failed to initialize page', error);
    });
  </script>
</body>
</html>
